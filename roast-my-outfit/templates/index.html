<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Roast My Outfit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 0 0 40px rgba(255, 69, 0, 0.6), 0 0 80px rgba(255, 69, 0, 0.3);
            letter-spacing: -2px;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 40px;
        }
        .upload-area {
            border: 3px dashed #333;
            border-radius: 20px;
            padding: 60px 20px;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #111;
        }
        .upload-area:hover, .upload-area.drag-over {
            border-color: #ff4500;
            background: #1a0a00;
            transform: scale(1.02);
        }
        .upload-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .upload-text {
            font-size: 1.2rem;
            color: #666;
        }
        input[type="file"] {
            display: none;
        }
        .analyze-btn {
            background: linear-gradient(135deg, #ff4500 0%, #ff6347 100%);
            color: white;
            border: none;
            padding: 18px 60px;
            font-size: 1.3rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 69, 0, 0.3);
            display: none;
        }
        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(255, 69, 0, 0.4);
        }
        .analyze-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .loading {
            display: none;
            margin-top: 20px;
        }
        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #ff4500;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }
        .modal-content {
            max-width: 600px;
            margin: 40px auto;
            background: #111;
            border-radius: 20px;
            padding: 40px;
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            color: #666;
            cursor: pointer;
            background: none;
            border: none;
            transition: color 0.3s;
        }
        .close-btn:hover {
            color: #fff;
        }
        .result-card {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            text-align: left;
            border: 1px solid #222;
        }
        .result-card h3 {
            font-size: 1.1rem;
            color: #ff4500;
            margin-bottom: 10px;
        }
        .result-card p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #ddd;
        }
        .share-btn {
            background: #222;
            color: white;
            border: 2px solid #333;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        .share-btn:hover {
            background: #333;
            border-color: #ff4500;
        }
        .preview-img {
            max-width: 100%;
            border-radius: 15px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 Roast My Outfit</h1>
        <p class="subtitle">Get brutally honest fashion feedback</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">👔</div>
            <div class="upload-text">Drop your outfit pic or click to upload</div>
        </div>
        
        <input type="file" id="fileInput" accept="image/*">
        <button class="analyze-btn" id="analyzeBtn">Get Roasted 🔥</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: #666;">Preparing your roast...</p>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="close-btn" id="closeBtn">&times;</button>
            <div id="results"></div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const modal = document.getElementById('modal');
        const closeBtn = document.getElementById('closeBtn');
        const results = document.getElementById('results');
        let selectedFile = null;

        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleFile(file);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });
        
        function handleFile(file) {
            selectedFile = file;
            uploadArea.innerHTML = `<div class="upload-icon">✅</div><div class="upload-text">${file.name}</div>`;
            analyzeBtn.style.display = 'inline-block';
        }
        
        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            analyzeBtn.disabled = true;
            loading.style.display = 'block';
            
            const formData = new FormData();
            formData.append('image', selectedFile);
            
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.error) {
                    alert('Error: ' + data.error);
                    return;
                }
                
                displayResults(data);
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                analyzeBtn.disabled = false;
                loading.style.display = 'none';
            }
        });
        
        function displayResults(data) {
            results.innerHTML = `
                <h2 style="text-align: center; margin-bottom: 30px; font-size: 2rem;">Your Roast 🔥</h2>
                
                <div class="result-card">
                    <h3>🔥 The Roast</h3>
                    <p>${data.roast || 'N/A'}</p>
                </div>
                
                <div class="result-card">
                    <h3>⭐ Rating</h3>
                    <p>${data.rating || 'N/A'}/10</p>
                </div>
                
                <div class="result-card">
                    <h3>💀 Worst Part</h3>
                    <p>${data.worst_part || 'N/A'}</p>
                </div>
                
                <div class="result-card">
                    <h3>💡 Advice</h3>
                    <p>${data.advice || 'N/A'}</p>
                </div>
                
                <div class="result-card">
                    <h3>✨ Vibe</h3>
                    <p>${data.vibe || 'N/A'}</p>
                </div>
                
                <button class="share-btn" onclick="location.reload()">Roast Another 🔥</button>
            `;
            
            modal.style.display = 'block';
        }
        
        closeBtn.addEventListener('click', () => {
            modal.style.display = 'none';
        });
        
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });
    </script>
</body>
</html>
