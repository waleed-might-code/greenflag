    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 40px rgba(100, 200, 255, 0.6),
                         0 0 80px rgba(100, 200, 255, 0.3);
            letter-spacing: -0.02em;
        }
        
        .subtitle {
            font-size: clamp(1rem, 3vw, 1.2rem);
            color: #888;
            margin-bottom: 3rem;
        }
        
        .upload-area {
            border: 3px dashed #333;
            border-radius: 20px;
            padding: 3rem 2rem;
            margin-bottom: 2rem;
            background: #111;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .upload-area:hover, .upload-area.drag-over {
            border-color: #64c8ff;
            background: #151515;
            transform: scale(1.02);
        }
        
        .upload-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .upload-text {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 0.5rem;
        }
        
        .upload-hint {
            font-size: 0.9rem;
            color: #666;
        }
        
        #fileInput {
            display: none;
        }
        
        .preview-container {
            margin: 1.5rem 0;
            display: none;
        }
        
        .preview-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 15px;
