<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate My Rizz 💫</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            text-shadow: 0 0 40px rgba(168, 85, 247, 0.6),
                         0 0 80px rgba(168, 85, 247, 0.3);
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 40px rgba(168, 85, 247, 0.6), 0 0 80px rgba(168, 85, 247, 0.3); }
            to { text-shadow: 0 0 60px rgba(168, 85, 247, 0.8), 0 0 100px rgba(168, 85, 247, 0.5); }
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 3rem;
        }
        
        .upload-area {
            border: 3px dashed #333;
            border-radius: 20px;
            padding: 60px 40px;
            margin-bottom: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #111;
        }
        
        .upload-area:hover, .upload-area.drag-over {
            border-color: #a855f7;
            background: #1a1a1a;
            transform: scale(1.02);
        }
        
        .upload-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .upload-text {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 0.5rem;
        }
        
        .upload-hint {
            font-size: 0.9rem;
            color: #666;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .preview-container {
            margin-top: 1rem;
            display: none;
        }
        
        .preview-img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .analyze-btn {
            background: linear-gradient(135deg, #a855f7 0%, #9333ea 100%);
            color: white;
            border: none;
            padding: 18px 60px;
            font-size: 1.3rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2rem;
        }
        
        .analyze-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(168, 85, 247, 0.4);
        }
        
        .analyze-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .analyze-btn.loading {
            position: relative;
            color: transparent;
        }
        
        .analyze-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 3px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }
        
        .modal.show {
            display: flex;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            background: #111;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.4s ease;
            border: 1px solid #222;
        }
        
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #666;
            font-size: 2rem;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        
        .close-btn:hover {
            color: #fff;
        }
        
        .result-card {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 4px solid #a855f7;
            transition: transform 0.3s ease;
        }
        
        .result-card:hover {
            transform: translateX(5px);
        }
        
        .result-card h3 {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .result-card p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #fff;
        }
        
        .rating-title {
            font-size: 2rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 30px;
            color: #a855f7;
        }
        
        .share-btn {
            background: #1a1a1a;
            color: #a855f7;
            border: 2px solid #a855f7;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        
        .share-btn:hover {
            background: #a855f7;
            color: #0a0a0a;
        }
        
        .error {
            color: #ef4444;
            background: #1a0a0a;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            border-left: 4px solid #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💫 Rate My Rizz</h1>
        <p class="subtitle">Find out your charisma score</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">✨</div>
            <div class="upload-text">Drop your photo here</div>
            <div class="upload-hint">or click to browse</div>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        
        <div class="preview-container" id="previewContainer">
            <img id="previewImg" class="preview-img" alt="Preview">
        </div>
        
        <button class="analyze-btn" id="analyzeBtn" disabled>Rate My Rizz 💫</button>
        
        <div id="error" class="error" style="display: none;"></div>
    </div>
    
    <div class="modal" id="resultModal">
        <div class="modal-content">
            <button class="close-btn" id="closeBtn">&times;</button>
            <div id="resultContent"></div>
            <button class="share-btn" id="shareBtn">📸 Share Rating</button>
        </div>
    </div>

    
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const previewImg = document.getElementById('previewImg');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const resultModal = document.getElementById('resultModal');
        const closeBtn = document.getElementById('closeBtn');
        const resultContent = document.getElementById('resultContent');
        const shareBtn = document.getElementById('shareBtn');
        const errorDiv = document.getElementById('error');
        
        let selectedFile = null;
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    previewContainer.style.display = 'block';
                    analyzeBtn.disabled = false;
                    errorDiv.style.display = 'none';
                };
                reader.readAsDataURL(selectedFile);
            }
        });
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            
            if (e.dataTransfer.files.length > 0) {
                selectedFile = e.dataTransfer.files[0];
                fileInput.files = e.dataTransfer.files;
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    previewContainer.style.display = 'block';
                    analyzeBtn.disabled = false;
                    errorDiv.style.display = 'none';
                };
                reader.readAsDataURL(selectedFile);
            }
        });
        
        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            analyzeBtn.disabled = true;
            analyzeBtn.classList.add('loading');
            errorDiv.style.display = 'none';
            
            const formData = new FormData();
            formData.append('image', selectedFile);
            
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Analysis failed');
                }
                
                displayResult(data.rating);
                resultModal.classList.add('show');
                
            } catch (error) {
                errorDiv.textContent = `❌ ${error.message}`;
                errorDiv.style.display = 'block';
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.classList.remove('loading');
            }
        });
        
        function displayResult(rating) {
            resultContent.innerHTML = `
                <div class="rating-title">💫 Your Rizz Rating 💫</div>
                <div class="result-card">
                    <pre style="white-space: pre-wrap; font-family: inherit; line-height: 1.8;">${rating}</pre>
                </div>
            `;
        }
        
        closeBtn.addEventListener('click', () => {
            resultModal.classList.remove('show');
        });
        
        resultModal.addEventListener('click', (e) => {
            if (e.target === resultModal) {
                resultModal.classList.remove('show');
            }
        });
        
        shareBtn.addEventListener('click', () => {
            alert('📸 Screenshot this rating to share!');
        });
    </script>
</body>
</html>
