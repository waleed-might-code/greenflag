<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How Rich Do I Look? 💎</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.3)); }
            to { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.6)); }
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 40px;
        }
        
        .upload-area {
            border: 3px dashed #333;
            border-radius: 20px;
            padding: 60px 20px;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 215, 0, 0.02);
        }
        
        .upload-area:hover {
            border-color: #FFD700;
            background: rgba(255, 215, 0, 0.05);
            transform: translateY(-2px);
        }
        
        .upload-area.dragover {
            border-color: #FFD700;
            background: rgba(255, 215, 0, 0.1);
            transform: scale(1.02);
        }
        
        .upload-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        .upload-text {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 10px;
        }
        
        .upload-hint {
            font-size: 0.9rem;
            color: #666;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .preview-container {
            margin: 20px 0;
            display: none;
        }
        
        .preview-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.2);
        }
        
        .analyze-btn {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            border: none;
            padding: 18px 50px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
            display: none;
        }
        
        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.6);
        }
        
        .analyze-btn:active {
            transform: translateY(0);
        }
        
        .analyze-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .loading {
            display: none;
            margin-top: 20px;
        }
        
        .loading-spinner {
            border: 4px solid #333;
            border-top: 4px solid #FFD700;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: #888;
            font-size: 1rem;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }
        
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            position: relative;
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.3);
            border: 1px solid #333;
        }
        
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #888;
            font-size: 2rem;
            cursor: pointer;
            transition: color 0.3s ease;
            line-height: 1;
        }
        
        .close-btn:hover {
            color: #FFD700;
        }
        
        .result-card {
            background: #0a0a0a;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid #222;
            text-align: left;
        }
        
        .result-card h3 {
            color: #FFD700;
            font-size: 1.3rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .result-card p {
            color: #ccc;
            font-size: 1.05rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        .share-btn {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }
        
        .share-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }
        
        .error {
            color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💎 How Rich Do I Look?</h1>
        <p class="subtitle">Upload your flex and get roasted by AI</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📸</div>
            <div class="upload-text">Drop your photo here</div>
            <div class="upload-hint">or click to browse</div>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        
        <div class="preview-container" id="previewContainer">
            <img id="previewImage" class="preview-image" alt="Preview">
        </div>
        
        <button class="analyze-btn" id="analyzeBtn">Analyze My Wealth 💰</button>
        
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">Calculating your fake net worth...</div>
        </div>
    </div>
    
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="close-btn" id="closeBtn">&times;</button>
            <div id="resultContent"></div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const previewImage = document.getElementById('previewImage');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const modal = document.getElementById('modal');
        const closeBtn = document.getElementById('closeBtn');
        const resultContent = document.getElementById('resultContent');
        
        let selectedFile = null;

        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });
        
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('Please upload an image file');
                return;
            }
            
            selectedFile = file;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewContainer.style.display = 'block';
                analyzeBtn.style.display = 'inline-block';
            };
            reader.readAsDataURL(file);
        }
        
        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            analyzeBtn.disabled = true;
            loading.style.display = 'block';
            
            const formData = new FormData();
            formData.append('image', selectedFile);
            
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    displayResult(data.result);
                } else {
                    throw new Error(data.error || 'Analysis failed');
                }
            } catch (error) {
                resultContent.innerHTML = `<div class="error">❌ ${error.message}</div>`;
                modal.classList.add('active');
            } finally {
                analyzeBtn.disabled = false;
                loading.style.display = 'none';
            }
        });
        
        function displayResult(analysis) {
            const lines = analysis.split('\n').filter(line => line.trim());
            let html = '<div id="shareCard">';
            
            const sections = {
                'WEALTH TIER': '👑',
                'FAKE NET WORTH': '💰',
                'WHAT LOOKS RICH': '✨',
                'WHAT LOOKS FAKE RICH': '🎭',
                'CLOSING LINE': '🔥'
            };

            
            let currentSection = '';
            let currentContent = '';
            
            for (let line of lines) {
                let foundSection = false;
                for (let [section, emoji] of Object.entries(sections)) {
                    if (line.includes(section)) {
                        if (currentSection && currentContent) {
                            html += `<div class="result-card">
                                <h3>${sections[currentSection]} ${currentSection}</h3>
                                <p>${currentContent.trim()}</p>
                            </div>`;
                        }
                        currentSection = section;
                        currentContent = line.replace(section, '').replace(/[:\.]/g, '').trim();
                        foundSection = true;
                        break;
                    }
                }
                if (!foundSection && currentSection) {
                    currentContent += '\n' + line;
                }
            }
            
            if (currentSection && currentContent) {
                html += `<div class="result-card">
                    <h3>${sections[currentSection]} ${currentSection}</h3>
                    <p>${currentContent.trim()}</p>
                </div>`;
            }
            
            html += '</div>';
            html += '<button class="share-btn" onclick="shareResult()">📤 Share Result</button>';
            
            resultContent.innerHTML = html;
            modal.classList.add('active');
        }
        
        function shareResult() {
            const shareCard = document.getElementById('shareCard');
            if (navigator.share) {
                navigator.share({
                    title: 'How Rich Do I Look?',
                    text: 'Check out my wealth analysis! 💎',
                    url: window.location.href
                }).catch(() => {});
            } else {
                alert('💎 Screenshot this result to share!');
            }
        }
        
        closeBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });
        
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });
    </script>
</body>
</html>
