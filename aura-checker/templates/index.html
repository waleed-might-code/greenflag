<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(102, 126, 234, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { filter: drop-shadow(0 0 20px rgba(102, 126, 234, 0.5)); }
            to { filter: drop-shadow(0 0 40px rgba(118, 75, 162, 0.8)); }
        }
        
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }
        
        .upload-area {
            border: 2px dashed #333;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            background: #111;
        }
        
        .upload-area:hover {
            border-color: #667eea;
            background: #151515;
        }
        
        .upload-area.drag-over {
            border-color: #667eea;
            background: #1a1a2e;
        }
        
        .upload-label {
            font-size: 1rem;
            color: #888;
            margin-bottom: 10px;
            display: block;
            font-weight: 600;
        }
        
        .file-name {
            color: #667eea;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .text-input {
            width: 100%;
            padding: 16px;
            border: 2px solid #333;
            border-radius: 12px;
            background: #111;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        
        .text-input:focus {
            outline: none;
            border-color: #667eea;
            background: #151515;
        }
        
        .text-input::placeholder {
            color: #555;
        }
        
        .divider {
            text-align: center;
            color: #555;
            margin: 20px 0;
            font-size: 0.9rem;
        }
        
        .analyze-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .analyze-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            border: 3px solid #333;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }
        
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: #111;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            position: relative;
            border: 1px solid #222;
        }
        
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #888;
            font-size: 2rem;
            cursor: pointer;
            transition: color 0.3s;
        }
        
        .close-btn:hover {
            color: #fff;
        }
        
        .result-card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            border-left: 4px solid #667eea;
        }
        
        .result-card h3 {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .result-card p {
            font-size: 1.3rem;
            font-weight: 600;
            color: #fff;
        }
        
        .verdict-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 30px;
            margin-top: 20px;
            text-align: center;
        }
        
        .verdict-card p {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.6;
            font-style: italic;
        }
        
        .share-btn {
            width: 100%;
            padding: 16px;
            background: #222;
            border: 2px solid #333;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        
        .share-btn:hover {
            background: #2a2a2a;
            border-color: #667eea;
        }
        
        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
            }
            .modal-content {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Aura Checker</h1>
        <p class="subtitle">Upload your selfie + music vibe</p>
        
        <div class="upload-area" id="selfieArea">
            <span class="upload-label">📸 Your Selfie</span>
            <p style="color: #555;">Click or drag to upload</p>
            <input type="file" id="selfieInput" accept="image/*">
            <div class="file-name" id="selfieName"></div>
        </div>
        
        <input type="text" class="text-input" id="musicLink" placeholder="Paste Spotify link or describe your music...">
        
        <div class="divider">— OR —</div>
        
        <div class="upload-area" id="musicArea">
            <span class="upload-label">🎵 Spotify Screenshot</span>
            <p style="color: #555;">Click or drag to upload</p>
            <input type="file" id="musicInput" accept="image/*">
            <div class="file-name" id="musicName"></div>
        </div>
        
        <button class="analyze-btn" id="analyzeBtn">Check My Aura</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Reading your aura...</p>
        </div>
    </div>
    
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="close-btn" id="closeBtn">&times;</button>
            
            <div class="result-card">
                <h3>✨ Aura Score</h3>
                <p id="auraScore"></p>
            </div>
            
            <div class="result-card">
                <h3>👑 Aura Archetype</h3>
                <p id="auraArchetype"></p>
            </div>
            
            <div class="result-card">
                <h3>🎭 Face to Music Match</h3>
                <p id="faceMatch"></p>
            </div>
            
            <div class="result-card">
                <h3>💫 Vibe Words</h3>
                <p id="vibeWords"></p>
            </div>
            
            <div class="verdict-card" id="verdictCard">
                <p id="verdict"></p>
            </div>
            
            <button class="share-btn" id="shareBtn">📤 Share Result</button>
        </div>
    </div>
    
    <script>
        const selfieArea = document.getElementById('selfieArea');
        const selfieInput = document.getElementById('selfieInput');
        const selfieName = document.getElementById('selfieName');
        const musicArea = document.getElementById('musicArea');
        const musicInput = document.getElementById('musicInput');
        const musicName = document.getElementById('musicName');
        const musicLink = document.getElementById('musicLink');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const modal = document.getElementById('modal');
        const closeBtn = document.getElementById('closeBtn');
        
        selfieArea.addEventListener('click', () => selfieInput.click());
        musicArea.addEventListener('click', () => musicInput.click());
        
        selfieInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                selfieName.textContent = e.target.files[0].name;
            }
        });
        
        musicInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                musicName.textContent = e.target.files[0].name;
            }
        });
        
        ['dragover', 'dragleave', 'drop'].forEach(event => {
            selfieArea.addEventListener(event, (e) => {
                e.preventDefault();
                e.stopPropagation();
            });
            musicArea.addEventListener(event, (e) => {
                e.preventDefault();
                e.stopPropagation();
            });
        });
        
        selfieArea.addEventListener('dragover', () => selfieArea.classList.add('drag-over'));
        selfieArea.addEventListener('dragleave', () => selfieArea.classList.remove('drag-over'));
        selfieArea.addEventListener('drop', (e) => {
            selfieArea.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length) {
                selfieInput.files = files;
                selfieName.textContent = files[0].name;
            }
        });
        
        musicArea.addEventListener('dragover', () => musicArea.classList.add('drag-over'));
        musicArea.addEventListener('dragleave', () => musicArea.classList.remove('drag-over'));
        musicArea.addEventListener('drop', (e) => {
            musicArea.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length) {
                musicInput.files = files;
                musicName.textContent = files[0].name;
            }
        });
        
        analyzeBtn.addEventListener('click', async () => {
            if (!selfieInput.files[0]) {
                alert('Please upload your selfie');
                return;
            }
            
            if (!musicLink.value.trim() && !musicInput.files[0]) {
                alert('Please provide either a Spotify link or screenshot');
                return;
            }
            
            const formData = new FormData();
            formData.append('selfie', selfieInput.files[0]);
            
            if (musicLink.value.trim()) {
                formData.append('music_link', musicLink.value.trim());
            }
            
            if (musicInput.files[0]) {
                formData.append('music_screenshot', musicInput.files[0]);
            }
            
            analyzeBtn.disabled = true;
            loading.classList.add('active');
            
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.error) {
                    alert('Error: ' + data.error);
                    return;
                }
                
                document.getElementById('auraScore').textContent = data.aura_score;
                document.getElementById('auraArchetype').textContent = data.aura_archetype;
                document.getElementById('faceMatch').textContent = data.face_music_match;
                document.getElementById('vibeWords').textContent = data.vibe_words;
                document.getElementById('verdict').textContent = data.verdict;
                
                modal.classList.add('active');
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                analyzeBtn.disabled = false;
                loading.classList.remove('active');
            }
        });
        
        closeBtn.addEventListener('click', () => modal.classList.remove('active'));
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('active');
        });
        
        document.getElementById('shareBtn').addEventListener('click', () => {
            alert('Screenshot this result to share!');
        });
    </script>
</body>
</html>
